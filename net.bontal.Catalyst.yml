app-id: net.bontal.Catalyst
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: catalyst
tags:
  - proprietary

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --system-talk-name=org.freedesktop.GeoClue2

modules:
  - name: catalyst
    buildsystem: simple
    build-commands:
      - tar -xzf catalyst-bundle.tar.gz
      - mkdir -p /app/catalyst
      - cp -a ./* /app/catalyst/
      - mkdir -p /app/bin
      - ln -s /app/catalyst/catalyst /app/bin/catalyst
      - mkdir -p /app/share/
      - cp -a /app/catalyst/share/* /app/share/
    sources:
      - type: file
        url: https://pkg.bontal.net/downloads/releases/catalyst-1.3.0-linux-x64.tar.gz
        sha256: d3ac179454e63ea03dcff0c655ca2c43fdb190af1488c79474017f9140f4cc4e
        dest-filename: catalyst-bundle.tar.gz
        only-arches:
          - x86_64
      - type: file
        url: https://pkg.bontal.net/downloads/releases/catalyst-1.1.0-linux-arm64.tar.gz
        sha256: 7356189e5e7f371d9bc3b105d91d65f3f4d3ccfaeea78e9306e3f2a53278d45c
        dest-filename: catalyst-bundle.tar.gz
        only-arches:
          - aarch64
